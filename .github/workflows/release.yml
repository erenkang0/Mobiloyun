name: 🧱 Build APK & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Sürüm numarası (örn: v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build-apk:
    name: Flutter APK Build
    runs-on: ubuntu-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4
        with:
          ref: claude/mobile-game-planning-cw4abu

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Flutter kur (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Bağımlılıkları yükle
        run: flutter pub get

      - name: APK derle (ARM64 + ARM32)
        run: flutter build apk --release --split-per-abi

      - name: Evrensel APK derle
        run: flutter build apk --release

      - name: Sürüm etiketi belirle
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: GitHub Release oluştur
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: "BRICLE ${{ steps.tag.outputs.name }}"
          body: |
            ## 🧱 BRICLE – Lego Brick Builder

            Rastgele renkli Lego tuğlalarıyla yaratıcı yapılar inşa et!

            ---

            ### 📱 Android APK İndir

            | Dosya | Cihaz |
            |-------|-------|
            | `app-arm64-v8a-release.apk` | ✅ Modern Android (2015+, 64-bit) – **Önerilen** |
            | `app-armeabi-v7a-release.apk` | Eski Android (32-bit) |
            | `app-release.apk` | Evrensel APK (tüm cihazlar) |

            ### 📲 Nasıl Kurulur?
            1. Yukarıdan APK dosyasını telefonunuza indirin
            2. **Ayarlar → Güvenlik → Bilinmeyen kaynaklardan yükleme** seçeneğini açın
            3. İndirilen APK dosyasına dokunun → **Yükle** butonuna basın
            4. Oyunu açın ve yaratıcılığınızı konuşturun! 🎮

            ### 🎮 Özellikler
            - Serbest Yapım modu
            - Meydan Oku modu
            - Sürükle-bırak + dokunarak tuğla yerleştirme
            - Tuğla döndürme & geri alma (undo)
            - 3D Lego stud görünümü
            - Animasyonlu konfeti tebrik ekranı
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
